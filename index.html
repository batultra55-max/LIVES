<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hussain IPTV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #ffd700; --gold-glow: rgba(255, 215, 0, 0.5); --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', system-ui; overflow-x: hidden; scroll-behavior: smooth; margin: 0; }
        
        .header-nav {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            z-index: 500; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #1a1a1a;
        }

        #search-container { flex: 1; max-width: 600px; margin: 0 15px; position: relative; }
        #search-input {
            width: 100%; background: #111; border: 1px solid #222; border-radius: 12px;
            padding: 10px 45px 10px 15px; color: white; outline: none; transition: 0.3s; font-size: 14px;
        }
        #search-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }

        #full-player-overlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }

        .channel-card { 
            background: linear-gradient(145deg, #0f0f0f, #050505); border: 1px solid #1a1a1a;
            border-radius: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; min-height: 120px; padding: 15px; contain: content;
        }
        .channel-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #111; }
        .channel-card i { font-size: 28px; margin-bottom: 12px; color: #333; transition: 0.3s; }
        .channel-card:hover i { color: var(--gold); }

        .exit-btn { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); color: #ef4444; backdrop-filter: blur(10px); }
        
        .animate-smooth { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .video-js .vjs-big-play-button { background-color: var(--gold) !important; color: black !important; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="text-gold font-bold text-lg hidden sm:block" style="color:var(--gold)">HUSSAIN TV</div>
        <div id="search-container">
            <input type="text" id="search-input" oninput="optimizedSearch()" placeholder="بحث في 6000+ قناة...">
            <i class="fa-solid fa-magnifying-glass absolute right-4 top-3.5 text-gray-600"></i>
        </div>
        <div id="count-display" class="text-[10px] text-gray-500 bg-gray-900 px-2 py-1 rounded">0 قناة</div>
    </div>

    <div id="main-ui" class="min-h-screen flex flex-col p-4 pt-24">
        <div id="channels-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4"></div>
        <div id="loader" class="text-center py-20" style="color:var(--gold)">
            <i class="fa-solid fa-circle-notch fa-spin fa-2xl mb-4"></i>
            <p>جاري تحميل قائمة القنوات...</p>
        </div>
    </div>

    <div id="full-player-overlay">
        <div class="absolute top-6 left-6 z-[2100]">
            <button onclick="closePlayer()" class="exit-btn px-6 py-2 rounded-full font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> إغلاق
            </button>
        </div>
        <video id="my-video" class="video-js vjs-big-play-centered w-full h-full" controls preload="auto"></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        let allChannels = [];
        let player = videojs('my-video', { responsive: true, fluid: false });
        let searchTimeout = null;

        const xtreamCreds = {
            user: "CSTPRS-6",
            pass: "mgGfbFE",
            host: "http://lvsxtv.com:80"
        };

        const m3uContent = `
#EXTINF:0,MBC 1
https://shls-live-enc.edgenextcdn.net/out/v1/0965e4d7deae49179172426cbfb3bc5e/index.m3u8
#EXTINF:0,MBC 4
https://shd-gcp-live.edgenextcdn.net/live/bitmovin-mbc-4/24f134f1cd63db9346439e96b86ca6ed/index.m3u8
#EXTINF:0,MBC 5
https://shd-gcp-live.edgenextcdn.net/live/bitmovin-mbc-5/ee6b000cee0629411b666ab26cb13e9b/index.m3u8
#EXTINF:0,MBC Iraq
https://shd-gcp-live.edgenextcdn.net/live/bitmovin-mbc-iraq/e38c44b1b43474e1c39cb5b90203691e/index.m3u8
        `;

        async function initApp() {
            await fetchXtreamChannels();
            parseInternalM3U();
            document.getElementById('loader').style.display = 'none';
            updateUI();
        }

        async function fetchXtreamChannels() {
            const { host, user, pass } = xtreamCreds;
            const url = `${host}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                const formatted = data.map(i => ({
                    name: i.name.toLowerCase(),
                    displayName: i.name,
                    url: `${host}/live/${user}/${pass}/${i.stream_id}.m3u8`
                }));
                allChannels = [...allChannels, ...formatted];
                document.getElementById('count-display').innerText = allChannels.length + " قناة";
            } catch (e) { console.error("Error fetching Xtream data"); }
        }

        function parseInternalM3U() {
            const lines = m3uContent.trim().split('\n');
            let m3uChannels = [];
            for(let i=0; i<lines.length; i++) {
                if(lines[i].includes('#EXTINF')) {
                    const name = lines[i].split(',')[1] || "Unknown";
                    const url = lines[i+1]?.trim();
                    if(url) m3uChannels.push({ name: name.trim().toLowerCase(), displayName: name.trim(), url: url });
                }
            }
            allChannels = [...m3uChannels, ...allChannels];
            document.getElementById('count-display').innerText = allChannels.length + " قناة";
        }

        function updateUI(filteredList = null) {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            const listToRender = filteredList || allChannels;
            const frag = document.createDocumentFragment();
            const limit = 300; 
            listToRender.slice(0, limit).forEach(chan => {
                const card = document.createElement('div');
                card.className = 'channel-card animate-smooth';
                card.innerHTML = `<i class="fa-solid fa-tv"></i><div class="text-[11px] font-bold leading-tight uppercase">${chan.displayName}</div>`;
                card.onclick = () => playChannel(chan.url);
                frag.appendChild(card);
            });
            grid.appendChild(frag);
            if (listToRender.length > limit) {
                setTimeout(() => {
                    const remainingFrag = document.createDocumentFragment();
                    listToRender.slice(limit).forEach(chan => {
                        const card = document.createElement('div');
                        card.className = 'channel-card';
                        card.innerHTML = `<i class="fa-solid fa-tv"></i><div class="text-[11px] font-bold leading-tight uppercase">${chan.displayName}</div>`;
                        card.onclick = () => playChannel(chan.url);
                        remainingFrag.appendChild(card);
                    });
                    grid.appendChild(remainingFrag);
                }, 100);
            }
        }

        function optimizedSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('search-input').value.toLowerCase();
                if (!query) { updateUI(); return; }
                const filtered = allChannels.filter(chan => chan.name.includes(query));
                updateUI(filtered);
            }, 300);
        }

        function playChannel(url) {
            document.getElementById('full-player-overlay').style.display = 'block';
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }

        function closePlayer() {
            player.pause();
            document.getElementById('full-player-overlay').style.display = 'none';
        }

        window.onload = initApp;
    </script>
</body>
</html>
